#================================================================
# RAG知识库系统 - Nginx 反向代理配置
# 适用于: Ubuntu 18.04+, CentOS 7+, Debian 9+
#================================================================

# 上游服务器配置
upstream rag_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP Server - 重定向到 HTTPS
server {
    listen 80;
    server_name your-domain.com;  # 替换为您的域名

    # 强制跳转 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为您的域名

    # SSL 证书配置
    ssl_certificate /etc/ssl/certs/your-domain.crt;      # 替换为您的证书路径
    ssl_certificate_key /etc/ssl/private/your-domain.key;  # 替换为您的私钥路径

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 访问日志
    access_log /var/log/nginx/rag-access.log;
    error_log /var/log/nginx/rag-error.log;

    # 上传文件大小限制
    client_max_body_size 50M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # 根路径
    location / {
        proxy_pass http://rag_backend;
        proxy_http_version 1.1;
        
        # 代理头配置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 连接升级（用于WebSocket等）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
        
        # 错误处理
        proxy_intercept_errors off;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }

    # Swagger UI
    location /swagger-ui.html {
        proxy_pass http://rag_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API 文档
    location /api-docs {
        proxy_pass http://rag_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Actuator 端点（生产环境建议限制访问）
    location /actuator {
        # 允许内网访问
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        # 禁止其他访问
        deny all;
        
        proxy_pass http://rag_backend;
        proxy_set_header Host $host;
    }

    # 静态资源（如果有）
    location /static {
        alias /opt/rag/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /health {
        proxy_pass http://rag_backend;
        access_log off;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# 性能监控（可选）
server {
    listen 8081;
    server_name localhost;

    location /metrics {
        stub_status on;
        access_log off;
        # 仅允许本地访问
        allow 127.0.0.1;
        deny all;
    }
}

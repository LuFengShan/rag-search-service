# yaml-language-server: $schema=https://json.schemastore.org/spring-boot.json
server:
  port: 8080

spring:
  application:
    name: rag-search-service
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.rag.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Spring AI MCP 服务端配置（模型上下文协议）
spring.ai.mcp.server:
  protocol: STREAMABLE
  annotation:
    enabled: true
    base-packages: com.example.rag.mcp

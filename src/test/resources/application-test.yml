spring:
  application:
    name: rag-test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  security:
    enabled: false

logging:
  level:
    root: WARN
    com.example.rag: DEBUG
    org.apache.tika: INFO

tika:
  max-string-length: 10000
